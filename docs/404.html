<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Anchor Social</title>
  <script>
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.host + '/SOCIAL/' +
      '?p=' + encodeURIComponent(l.pathname.slice('/SOCIAL/'.length) + l.search) +
      (l.hash ? '&h=' + encodeURIComponent(l.hash.slice(1)) : '')
    );
  </script>
</head>
<body></body>
</html>
